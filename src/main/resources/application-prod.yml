spring:
  cloud:
    vault:
      enabled: false
    config:
      enabled: false
    # Routes are defined in Java (GatewayRouteConfig.java) for better control over precedence and rewriting.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Cloud Run uses PORT env var (8080)
server:
  port: ${PORT:8080}

# Disable Vault health indicator
management:
  health:
    vault:
      enabled: false

# Disable Zipkin/tracing
spring.zipkin:
  enabled: false
management.tracing:
  enabled: false
  sampling:
    probability: 0

logging:
  level:
    root: WARN
    com.udea.bancodigital: INFO

server.error:
  include-message: never
  include-stacktrace: never
