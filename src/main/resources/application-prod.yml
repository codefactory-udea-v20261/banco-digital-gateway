spring:
  cloud:
    vault:
      enabled: false
    config:
      enabled: false
    gateway:
      routes:
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/internal/users/**
        - id: core-banking-service
          uri: ${CORE_BANKING_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/v1/clientes/**,/api/v1/cuentas/**,/api/v1/transacciones/**,/api/v1/transferencias/**,/api/v1/monitoring/**
        - id: audit-service
          uri: ${AUDIT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/audit/**
        - id: reporting-service
          uri: ${REPORTING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/reportes/**,/api/v1/reports/**
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Disable Eureka for Cloud Run (use direct URLs above)
eureka:
  client:
    enabled: false
    registerWithEureka: false
    fetchRegistry: false

# Cloud Run uses PORT env var (8080)
server:
  port: ${PORT:8080}

# Disable Vault health indicator
management:
  health:
    vault:
      enabled: false

# Disable Zipkin
spring.zipkin:
  enabled: false

logging:
  level:
    root: WARN
    com.udea.bancodigital: INFO

server.error:
  include-message: never
  include-stacktrace: never
