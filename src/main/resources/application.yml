spring:
  application:
    name: banco-digital-gateway
  profiles:
    active: ${APP_PROFILE:local}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: '*'
            maxAge: 3600

    discovery:
      client:
        serviceIdToZoneMapping:
          identity-service: default
          core-banking-service: default
          audit-service: default
          reporting-service: default

    loadbalancer:
      ribbon:
        enabled: false

server:
  port: ${PORT:${APP_PORT:8000}}
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

# SpringDoc OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    doc-expansion: list
    show-extensions: true
  show-actuator: true
  
# Tracing Configuration
spring.zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411/}
  enabled: true
spring.sleuth:
  sampler:
    probability: 1.0

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      identity-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5000
        eventConsumerBufferSize: 10
      core-banking-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5000

  ratelimiter:
    instances:
      api-rate-limit:
        registerHealthIndicator: false
        limitRefreshPeriod: 1m
        limitForPeriod: 100
        timeoutDuration: 5s

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
