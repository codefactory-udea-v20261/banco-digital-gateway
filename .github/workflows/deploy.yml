name: Deploy Gateway to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-gateway
  cancel-in-progress: false

env:
  SERVICE_NAME: gateway
  IMAGE_NAME: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/banco-digital-repo/gateway

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          IDENTITY_SERVICE_URL: ${{ secrets.IDENTITY_SERVICE_URL }}
        run: |
          required=(
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            JWT_SECRET
            IDENTITY_SERVICE_URL
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t "${{ env.IMAGE_NAME }}:${{ github.sha }}" .
          docker push "${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars_update_strategy: overwrite
          flags: >-
            --memory=512Mi
            --cpu=1
            --timeout=600
            --allow-unauthenticated
          env_vars: |
            APP_PROFILE=prod
            SPRING_PROFILES_ACTIVE=prod
            SPRING_CLOUD_VAULT_ENABLED=false
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            IDENTITY_SERVICE_URL=${{ secrets.IDENTITY_SERVICE_URL }}
            CORE_BANKING_SERVICE_URL=${{ secrets.CORE_BANKING_SERVICE_URL }}
            AUDIT_SERVICE_URL=${{ secrets.AUDIT_SERVICE_URL }}
            REPORTING_SERVICE_URL=${{ secrets.REPORTING_SERVICE_URL }}

      - name: Smoke test health endpoint
        run: |
          url="${{ steps.deploy.outputs.url }}"
          if [ -z "$url" ]; then
            echo "Deployment URL not found"
            exit 1
          fi

          for i in 1 2 3 4 5 6; do
            if curl -fsS "${url}/actuator/health" >/dev/null; then
              echo "Health check OK: ${url}/actuator/health"
              exit 0
            fi
            echo "Health check retry ${i}/6..."
            sleep 15
          done

          echo "Health check failed for ${url}/actuator/health"
          exit 1
